<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>She Can Foundation - Thank You</title>
    <link rel="stylesheet" href="submit.css" />
  </head>
  <body>
    <div class="successContainer">
      <div class="successCard">
        <div class="checkmark">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="80"
            height="80"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h1>Thank You!</h1>
        <p class="successMessage">Your form has been submitted successfully.</p>
        <p class="successDetail">
          Thank you for joining She Can Foundation. We'll get in touch with you
          soon!
        </p>
        <button
          class="backButton"
          onclick="window.location.href = 'landingPage.html'"
        >
          Back to Home
        </button>
      </div>
    </div>
  </body>
</html>
